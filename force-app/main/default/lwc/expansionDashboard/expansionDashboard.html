<template>
  <lightning-card>
    <div slot="title">
      <span style="font-size:1.1rem;font-weight:500;">Store Expansion Intelligence Dashboard</span>
    </div>
    <div slot="actions">
      <lightning-button-group>
        <lightning-button label="Refresh Scores" variant="neutral" onclick={refreshData}></lightning-button>
      </lightning-button-group>
    </div>

    <div class="slds-p-horizontal_medium">

      <!-- Filters row -->
      <div class="slds-grid slds-gutters slds-m-bottom_medium slds-m-top_small">
        <div class="slds-col slds-size_1-of-3">
          <lightning-combobox
            label="Filter by City"
            value={selectedCity}
            options={cityOptions}
            onchange={handleCityChange}>
          </lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-3">
          <lightning-input
            type="range"
            label={sliderLabel}
            min="0" max="100" step="5"
            value={minScore}
            onchange={handleScoreFilter}>
          </lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-3">
          <lightning-combobox
            label="Competition Level"
            value={selectedCompetition}
            options={competitionOptions}
            onchange={handleCompetitionChange}>
          </lightning-combobox>
        </div>
      </div>

      <!-- KPI cards -->
      <div class="slds-grid slds-gutters slds-m-bottom_medium">
        <template for:each={kpiCards} for:item="kpi">
          <div key={kpi.id} class="slds-col slds-size_1-of-4">
            <div class={kpi.cssClass}>
              <p class="kpi-number">{kpi.value}</p>
              <p class="kpi-label">{kpi.label}</p>
              <p class="kpi-sub">{kpi.sub}</p>
            </div>
          </div>
        </template>
      </div>

      <!-- Chart -->
      <div class="slds-m-bottom_medium" style="position:relative;height:340px;">
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>
        <canvas lwc:ref="chartCanvas" style="width:100%;height:340px;"></canvas>
      </div>

      <!-- Legend -->
      <div class="slds-grid slds-gutters slds-m-bottom_medium" style="font-size:0.8rem;">
        <div class="slds-col"><span style="color:#1D9E75;font-weight:600;">&#9679; Low competition</span> &mdash; nearest rival &gt;2km</div>
        <div class="slds-col"><span style="color:#BA7517;font-weight:600;">&#9679; Medium competition</span> &mdash; 500m&ndash;2km</div>
        <div class="slds-col"><span style="color:#A32D2D;font-weight:600;">&#9679; High competition</span> &mdash; &lt;500m</div>
        <div class="slds-col" style="color:#888;">Bubble size = projected monthly revenue</div>
      </div>

      <!-- Data table -->
      <lightning-datatable
        key-field="siteId"
        data={filteredSites}
        columns={columns}
        sorted-by={sortBy}
        sorted-direction={sortDirection}
        onsort={handleSort}
        onrowaction={handleRowAction}
        hide-checkbox-column>
      </lightning-datatable>

    </div>
  </lightning-card>

  <!-- Scorecard Modal -->
  <template if:true={showModal}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header class="slds-modal__header" style="background:#16325c;">
          <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                  onclick={closeModal} title="Close">
            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
          </button>
          <h2 class="slds-modal__title slds-hyphenate" style="color:#fff;font-size:1.1rem;">
            Site Scorecard &mdash; {selectedSite.name}, {selectedSite.city}
          </h2>
        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <div class="slds-grid slds-gutters slds-wrap">

            <!-- Demand Score -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Demand Score</p>
                <p class={scoreBadgeClass}>{selectedSite.demandScore} / 100</p>
              </div>
            </div>

            <!-- Verdict -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Verdict</p>
                <p class={verdictClass}>{selectedSite.siteRecommendation}</p>
              </div>
            </div>

            <!-- Competition -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Competition Level</p>
                <p class="scorecard-value">{selectedSite.competitorDensity}</p>
                <p class="scorecard-sub">{selectedSite.nearestCompetitorDistanceM}m to nearest rival</p>
              </div>
            </div>

            <!-- Revenue -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Est. Monthly Revenue</p>
                <p class="scorecard-value">&#8377; {selectedSite.projectedRevenueFormatted}</p>
              </div>
            </div>

            <!-- Setup Cost -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Setup Cost (CapEx)</p>
                <p class="scorecard-value">&#8377; {selectedSite.estimatedSetupCostFormatted}</p>
              </div>
            </div>

            <!-- Payback -->
            <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
              <div class="scorecard-metric">
                <p class="scorecard-label">Payback Period</p>
                <p class="scorecard-value">{selectedSite.paybackPeriodYears} years</p>
                <p class="scorecard-sub">Industry benchmark: 3–5 years</p>
              </div>
            </div>

          </div>
          <p style="font-size:0.75rem;color:#888;text-align:right;margin-top:0.5rem;">
            Powered by Agentforce &bull; Scores computed by Salesforce Data Cloud
          </p>
        </div>
        <footer class="slds-modal__footer">
          <lightning-button label="Close" onclick={closeModal}></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

</template>
